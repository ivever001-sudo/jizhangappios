name: Build iOS

on:
  push:
    branches: [ "main" ] # 或者 master

jobs:
  build-ios:
    runs-on: macos-latest
    
    # 💥 核心修复：告诉 GitHub 你的代码在哪个文件夹里！
    # 如果你的文件夹不叫 jizhangApp-ios，请改成你仓库里实际装有 gradlew 的文件夹名
    defaults:
      run:
        working-directory: ./jizhangApp-ios 

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      # 现在系统已经进到文件夹里了，绝对能找到 gradlew 并加权限！
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build iOS Framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
